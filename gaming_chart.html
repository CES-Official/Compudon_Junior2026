<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Apps Data Collection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #2c5f7c 0%, #1a3a4d 100%);
            min-height: 100vh;
            width: 100vw;
            padding: min(3vh, 20px) min(3vw, 20px);
            color: white;
            overflow-x: hidden;
        }

        .container {
            max-width: min(1200px, 95vw);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 94vh;
        }

        h1 {
            text-align: center;
            font-size: clamp(1.2rem, 2.5vw, 2.5rem);
            margin-bottom: min(5vh, 40px);
            font-weight: 500;
            line-height: 1.3;
        }

        .chart {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: min(2vh, 15px);
            margin-bottom: min(3vh, 25px);
        }

        .chart-row {
            display: flex;
            align-items: center;
            gap: min(2vw, 20px);
        }

        .game-label {
            width: clamp(100px, 15vw, 180px);
            text-align: right;
            font-size: clamp(0.85rem, 1.8vw, 1.1rem);
            flex-shrink: 0;
        }

        .bar-container {
            flex: 1;
            height: clamp(28px, 3.5vh, 40px);
            position: relative;
            display: flex;
            min-width: 0;
        }

        .bar-segment {
            height: 100%;
            position: relative;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .bar-segment:hover {
            opacity: 0.85;
        }

        .bar-segment.tracking {
            background: #4dd0e1;
            border-radius: 0 20px 20px 0;
        }

        .bar-segment.linked {
            background: #f48fb1;
            border-radius: 20px 0 0 20px;
        }

        .bar-segment.not-linked {
            background: #26c6da;
            border-radius: 20px;
        }

        .bar-segment.linked + .bar-segment.tracking {
            border-radius: 0 20px 20px 0;
        }

        .bar-segment.tracking + .bar-segment.linked {
            border-radius: 0 20px 20px 0;
        }

        .bar-segment:first-child {
            border-radius: 20px 0 0 20px;
        }

        .bar-segment:last-child {
            border-radius: 0 20px 20px 0;
        }

        .bar-segment:first-child:last-child {
            border-radius: 20px;
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: clamp(6px, 1vh, 10px) clamp(8px, 1.5vw, 14px);
            border-radius: 6px;
            font-size: clamp(0.75rem, 1.5vw, 0.9rem);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
            z-index: 1000;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
        }

        .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: rgba(0, 0, 0, 0.9);
        }

        .bar-segment:hover .tooltip {
            opacity: 1;
        }

        .axis {
            display: flex;
            justify-content: space-between;
            margin-left: clamp(110px, 17vw, 200px);
            margin-top: min(1.5vh, 12px);
            padding-right: min(2vw, 20px);
            font-size: clamp(0.8rem, 1.6vw, 1.1rem);
            color: rgba(255, 255, 255, 0.7);
        }

        .legend {
            margin-top: min(3vh, 30px);
            margin-left: clamp(110px, 17vw, 200px);
        }

        .legend-title {
            font-size: clamp(0.85rem, 1.7vw, 1.1rem);
            margin-bottom: min(1.5vh, 12px);
            color: rgba(255, 255, 255, 0.7);
        }

        .legend-items {
            display: flex;
            gap: clamp(15px, 3vw, 40px);
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: clamp(8px, 1.2vw, 12px);
            font-size: clamp(0.8rem, 1.6vw, 1rem);
        }

        .legend-color {
            width: clamp(16px, 2.5vw, 20px);
            height: clamp(16px, 2.5vw, 20px);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .footer {
            margin-top: min(4vh, 35px);
            text-align: center;
            font-size: clamp(0.65rem, 1.3vw, 0.85rem);
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
        }

        /* Tablet and smaller */
        @media (max-width: 1024px) {
            .game-label {
                width: clamp(90px, 18vw, 140px);
            }

            .axis, .legend {
                margin-left: clamp(100px, 20vw, 160px);
            }
        }

        /* Mobile landscape and smaller tablets */
        @media (max-width: 768px) {
            body {
                padding: min(2vh, 15px) min(2vw, 15px);
            }

            h1 {
                font-size: clamp(1.1rem, 3.5vw, 1.8rem);
                margin-bottom: min(3vh, 25px);
            }

            .game-label {
                width: clamp(80px, 22vw, 130px);
                font-size: clamp(0.75rem, 2.2vw, 0.95rem);
            }

            .chart {
                gap: min(1.5vh, 12px);
            }

            .bar-container {
                height: clamp(24px, 3vh, 32px);
            }

            .axis, .legend {
                margin-left: clamp(90px, 24vw, 150px);
            }

            .legend-items {
                gap: clamp(12px, 4vw, 25px);
            }

            .footer {
                font-size: clamp(0.6rem, 1.8vw, 0.75rem);
            }
        }

        /* Mobile portrait */
        @media (max-width: 480px) {
            h1 {
                font-size: clamp(1rem, 4.5vw, 1.5rem);
                margin-bottom: min(2.5vh, 20px);
                line-height: 1.2;
            }

            .game-label {
                width: clamp(70px, 25vw, 110px);
                font-size: clamp(0.7rem, 2.8vw, 0.85rem);
            }

            .chart {
                gap: min(1.2vh, 10px);
            }

            .chart-row {
                gap: min(3vw, 12px);
            }

            .bar-container {
                height: clamp(22px, 2.8vh, 28px);
            }

            .axis, .legend {
                margin-left: clamp(80px, 28vw, 125px);
            }

            .legend-title {
                font-size: clamp(0.75rem, 2.5vw, 0.9rem);
            }

            .legend-items {
                gap: clamp(10px, 5vw, 20px);
                flex-direction: column;
                align-items: flex-start;
            }

            .legend-item {
                font-size: clamp(0.7rem, 2.5vw, 0.85rem);
            }

            .tooltip {
                font-size: clamp(0.65rem, 2.2vw, 0.75rem);
                padding: clamp(4px, 0.8vh, 8px) clamp(6px, 2vw, 10px);
            }
        }

        /* Very short screens */
        @media (max-height: 600px) {
            h1 {
                margin-bottom: 2vh;
            }

            .chart {
                gap: 1vh;
                margin-bottom: 2vh;
            }

            .legend {
                margin-top: 2vh;
            }

            .footer {
                margin-top: 2vh;
                font-size: 0.7rem;
            }
        }

        /* Very small screens */
        @media (max-width: 360px) {
            .game-label {
                width: 70px;
                font-size: 0.65rem;
            }

            .axis, .legend {
                margin-left: 80px;
            }

            h1 {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Most popular gaming apps and the amount of data points they<br>collect from children</h1>
        
        <div class="chart" id="chart"></div>
        
        <div class="axis">
            <span>0</span>
            <span>5</span>
            <span>10</span>
            <span>15</span>
            <span>20</span>
            <span>25</span>
        </div>

        <div class="legend">
            <div class="legend-title">Data exposure level:</div>
            <div class="legend-items">
                <div class="legend-item">
                    <div class="legend-color" style="background: #4dd0e1;"></div>
                    <span>Data Used to Track Your Child</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f48fb1;"></div>
                    <span>Data Linked to Your Child</span>
                </div>
            </div>
        </div>

        <div class="footer">
            Data Source: SurfShark<br>
        </div>
    </div>

    <script>
        const data = [
            { game: 'Minecraft', tracking: 1, linked: 6, notLinked: 0 },
            { game: 'Angry Birds 2', tracking: 3, linked: 11, notLinked: 0 },
            { game: 'Roblox', tracking: 0, linked: 14, notLinked: 0 },
            { game: 'Candy Crush', tracking: 11, linked: 15, notLinked: 0 },
            { game: 'Pokemon', tracking: 2, linked: 14, notLinked: 0 },
            { game: 'Fifa', tracking: 6, linked: 10, notLinked: 0 },
            { game: 'The Sims', tracking: 6, linked: 10, notLinked: 0 },
            { game: 'Crossy Road', tracking: 0, linked: 0, notLinked: 18 },
            { game: 'Call of Duty', tracking: 8, linked: 18, notLinked: 0 }
        ];

        const maxValue = 26;
        const chartContainer = document.getElementById('chart');

        data.forEach(item => {
            const row = document.createElement('div');
            row.className = 'chart-row';

            const label = document.createElement('div');
            label.className = 'game-label';
            label.textContent = item.game;

            const barContainer = document.createElement('div');
            barContainer.className = 'bar-container';

            const total = item.tracking + item.linked + item.notLinked;

            // Create segments in order: tracking, linked, notLinked
            if (item.tracking > 0) {
                const segment = createSegment(item.tracking, 'tracking', 'Data Used to Track Your Child');
                barContainer.appendChild(segment);
            }

            if (item.linked > 0) {
                const segment = createSegment(item.linked, 'linked', 'Data Linked to Your Child');
                barContainer.appendChild(segment);
            }

            if (item.notLinked > 0) {
                const segment = createSegment(item.notLinked, 'not-linked', 'Data Not Linked to Your Child');
                barContainer.appendChild(segment);
            }

            row.appendChild(label);
            row.appendChild(barContainer);
            chartContainer.appendChild(row);
        });

        function createSegment(value, type, label) {
            const segment = document.createElement('div');
            segment.className = `bar-segment ${type}`;
            segment.style.width = `${(value / maxValue) * 100}%`;

            const tooltip = document.createElement('div');
            tooltip.className = 'tooltip';
            tooltip.textContent = `${label}: ${value} data points`;
            
            segment.appendChild(tooltip);

            return segment;
        }
    </script>
</body>
</html>
