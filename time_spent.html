<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Apps Do Children Use?</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #534AB7;
      --blue: #378ADD;
      --bg: #F7F6F2;
      --surface: #FFFFFF;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --border: rgba(0,0,0,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      max-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 52px 64px 40px;
    }

    .card {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      margin-bottom: 36px;
    }

    .eyebrow {
      padding-top: 2vh;
      margin-top: -8vh;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .title {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--text-primary);
      line-height: 1.2;
      font-weight: 400;
    }

     .subtitle {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--text-primary);
      line-height: 1.2;
      font-weight: 400;
    }

    .legend {
      display: flex;
      gap: 24px;
      margin-top: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    .chart-area {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      align-items: end;
      flex: 1;
    }

    .group {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
      gap: 16px;
    }

    .bars {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      height: 100%;
      width: 100%;
      justify-content: center;
    }

    .bar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
      gap: 5px;
    }

    .pct {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .bar {
      width: clamp(60px, 8vw, 120px);
      border-radius: 4px 4px 0 0;
      transition: opacity 0.15s ease;
    }

    .bar:hover { opacity: 0.82; }

    .bar.purple { background: var(--purple); }
    .bar.blue   { background: var(--blue); }

    .label {
      font-size: 12.5px;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.45;
      font-weight: bolder;
      max-width: 120px;
    }

    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: #b0b0b0;
      text-align: right;
      letter-spacing: 0.02em;
    }

    @media (max-width: 520px) {
      .card { padding: 0 0 0% 0;}
      .title { font-size: 22px; }
      .bar { width: 34px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <p class="eyebrow">Children &amp; Technology</p>
  <h5 class="title">Social Media vs Educational app </h5>
    <h5 class="subtitle">Usage by children per age group </h5>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot" style="background: var(--purple);"></div>
          Ages 7–9
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background: var(--blue);"></div>
          Ages 10–12
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="chart-area">

      <div class="group">
        <div class="bars">
          <div class="bar-wrap">
            <span class="pct">32%</span>
            <div class="bar purple" style="height: 32vh;"></div>
          </div>
          <div class="bar-wrap">
            <span class="pct">49%</span>
            <div class="bar blue" style="height: 49vh;"></div>
          </div>
        </div>
        <div class="label">Social media use</div>
      </div>

      <div class="group">
        <div class="bars">
          <div class="bar-wrap">
            <span class="pct">50%</span>
            <div class="bar purple" style="height: 50vh;"></div>
          </div>
          <div class="bar-wrap">
            <span class="pct">28%</span>
            <div class="bar blue" style="height: 28vh;"></div>
          </div>
        </div>
        <div class="label">Educational apps only</div>
      </div>

      <div class="group">
        <div class="bars">
          <div class="bar-wrap">
            <span class="pct">18%</span>
            <div class="bar purple" style="height: 18vh;"></div>
          </div>
          <div class="bar-wrap">
            <span class="pct">23%</span>
            <div class="bar blue" style="height: 23vh;"></div>
          </div>
        </div>
        <div class="label">No apps</div>
      </div>

    </div>
  </div>
</body>
</html>
